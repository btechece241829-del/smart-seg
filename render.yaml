services:
  - type: web
    name: mall-segmentation-dashboard
    env: python
    rootDir: mall_segmentation
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --timeout 120 app:app
    healthCheckPath: /
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
